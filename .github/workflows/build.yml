name: Build OpenWrt Firmware

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc g++ make wget unzip python3

      - name: Run docker-build.sh
        run: |
          chmod +x immortalwrt/docker-build.sh
          ./immortalwrt/docker-build.sh

      - name: Run build.sh
        run: |
          chmod +x immortalwrt/build.sh
          ./immortalwrt/build.sh

      - name: Find firmware files
        id: find_firmware
        run: |
          mkdir -p upload
          find . -type f \( -name "*.img" -o -name "*.bin" -o -name "*.trx" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          echo "firmware_files=$(ls upload | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: upload/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "openwrt-$(date +'%Y%m%d-%H%M%S')"
          name: "OpenWrt Firmware $(date +'%Y-%m-%d %H:%M:%S')"
          body: "Automated build of OpenWrt firmware."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload firmware to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_release.outputs.tag_name }}
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
